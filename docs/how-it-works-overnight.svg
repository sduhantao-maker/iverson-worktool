<svg width="920" height="220" viewBox="0 0 920 220" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="15" y="30" width="260" height="170" rx="16" fill="#4f46e5"/>
  <circle cx="47" cy="64" r="17" fill="#ffffff"/>
  <text x="47" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#4f46e5">1</text>
  <text x="76" y="70" font-size="17" font-weight="700" fill="#ffffff">Schedule (evening)</text>
  <text x="37" y="108" font-size="13.5" fill="#e8e9fb">Write the prompt for Codex</text>
  <text x="37" y="130" font-size="13.5" fill="#e8e9fb">&amp; Claude, attach your files,</text>
  <text x="37" y="152" font-size="13.5" fill="#e8e9fb">pick a daily send time.</text>

  <line x1="285" y1="115" x2="322" y2="115" stroke="#9ca3af" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="330" y="30" width="260" height="170" rx="16" fill="#0d9488"/>
  <circle cx="362" cy="64" r="17" fill="#ffffff"/>
  <text x="362" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#0d9488">2</text>
  <text x="391" y="70" font-size="17" font-weight="700" fill="#ffffff">Keep going</text>
  <text x="352" y="108" font-size="13.5" fill="#e3f4f2">Turn on KeepGoing, close</text>
  <text x="352" y="130" font-size="13.5" fill="#e3f4f2">the lid, unplug — the Mac</text>
  <text x="352" y="152" font-size="13.5" fill="#e3f4f2">stays awake &amp; online.</text>

  <line x1="600" y1="115" x2="637" y2="115" stroke="#9ca3af" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="645" y="30" width="260" height="170" rx="16" fill="#b45309"/>
  <circle cx="677" cy="64" r="17" fill="#ffffff"/>
  <text x="677" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">3</text>
  <text x="706" y="70" font-size="17" font-weight="700" fill="#ffffff">Wake to results</text>
  <text x="667" y="108" font-size="13.5" fill="#fbeadd">Overnight the send fires;</text>
  <text x="667" y="130" font-size="13.5" fill="#fbeadd">you wake to finished work</text>
  <text x="667" y="152" font-size="13.5" fill="#fbeadd">+ a fresh quota for your day.</text>
</svg>
